# Default values for stalwart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Override the chart name used in resource names and labels.
nameOverride: ""
# Override the full release-qualified resource name.
fullnameOverride: ""

# Container image.
image:
  repository: stalwartlabs/stalwart
  tag: v0.16.3
  pullPolicy: IfNotPresent

# Number of pods in the StatefulSet.
# Single-node deployments keep this at 1.
# For a clustered deployment, raise this value and set `role` (and
# `pushShard` where applicable) to a value that makes sense for the
# whole StatefulSet, or install multiple releases of this chart with
# different role values.
replicaCount: 1

# Maps to STALWART_ROLE. Names a ClusterRole defined in the database.
# Leave empty on single-node installs to run every task and listener.
# See https://stalw.art/docs/cluster/configuration/roles/ for the role model.
role: ""

# Maps to STALWART_PUSH_SHARD. Only set on nodes whose role delivers
# push notifications. Leave empty on single-node installs.
pushShard: ""

# Recovery / bootstrap administrator credential.
# Enable this on first install so the operator can sign in without
# scraping the pod logs for the generated temporary password.
# Remove it once a permanent administrator account has been
# provisioned through the setup wizard.
recoveryAdmin:
  enabled: false
  username: admin
  password: "change-me"
  # Optional name of an existing Secret that contains the admin credentials.
  existingSecret: false
  secretName: ""

# Starts the pods in recovery mode. Suspends mail services and
# exposes only the management listener on the configured port.
# See https://stalw.art/docs/configuration/recovery-mode/
recoveryMode:
  enabled: false
  port: 8080
  logLevel: info

# Extra environment variables injected into the container, for
# store credentials that live in plain text.
extraEnv: {}
# Use STALWART_PUBLIC_URL when the external URL clients use differs
# from the server’s default hostname (e.g., proxy, custom port, or path).
# It makes discovery links use the correct public address.
# see https://stalw.art/docs/configuration/environment-variables#public-urls
# - name: STALWART_PUBLIC_URL
#   value: https://mail.example.com

# Extra environment variables injected from the managed Secret.
# Use this for anything sensitive (database passwords, S3 keys, etc.).
extraSecretEnv: {}

# config.json contents. Rendered verbatim into the ConfigMap.
# Only the DataStore object belongs here; every other setting lives
# in the database once the server is bootstrapped.
# See https://stalw.art/docs/configuration/overview and https://stalw.art/docs/ref/object/data-store.
config:
  "@type": RocksDb
  path: /var/lib/stalwart

# Default ports for the listeners. These are used in the container spec and service definition.
ports:
  smtp: 25
  smtps: 465
  submission: 587
  imap: 143
  imaps: 993
  pop3: 110
  pop3s: 995
  sieve: 4190
  http: 80
  https: 443
  mgmt: 8080

# Uncomment and adjust the following for a PostgreSQL-backed deployment.
# config:
#   "@type": "PostgreSql"
#   host: stalwart-postgres
#   port: 5432
#   database: stalwart
#   authUsername: stalwart
#   authSecret:
#     "@type": "EnvironmentVariable"
#     variableName: PASSWORD

# Service definition. Change `type` to LoadBalancer when a cloud
# load balancer should expose the mail ports directly, or keep it
# as ClusterIP and front the chart with an Ingress / gateway for
# the HTTP listeners only.
service:
  enabled: true
  type: ClusterIP
  annotations: {}
  # Override the default ports on the service layer if needed.
  # If custom ports are used, you must set all the required
  # ports, not just the ones you want to change.
  # ports:
  #   smtp: 2525
  #   smtps: 465
  #   submission: 587
  #   imap: 143
  #   imaps: 993
  #   pop3: 110
  #   pop3s: 995
  #   sieve: 4190
  #   http: 80
  #   https: 443
  #   mgmt: 8080

# Ingress for the HTTP / HTTPS listeners only. Mail protocols
# require L4 exposure and are not handled here.
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: mail.example.com
      paths:
        - path: /
          pathType: Prefix
          portName: https
  tls: []
  # tls:
  #   - secretName: mail-example-com-tls
  #     hosts:
  #      - mail.example.com

# Default security context for the container.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  runAsGroup: 2000
  fsGroup: 2000

# Pod-level security context. Applies to all containers in the pod.
SecurityContext:
  allowPrivilegeEscalation: false

# Persistent volume for the data directory. Required when the
# DataStore is a local backend such as RocksDB. Can be disabled
# for deployments that use an external store (PostgreSQL, MySQL,
# FoundationDB, S3-backed blob store, etc.).
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  storageClass: ""
  size: 20Gi
  mountPath: /var/lib/stalwart # Must match the path in config.@type: RocksDb.path

# Resource requests and limits for the container.
resources: {}

# Mounts a Kubernetes TLS Secret into /etc/stalwart/tls/ inside the container.
# Stalwart reads tls.crt and tls.key from that path once configured via the
# management UI or stalwart-cli.
# The certificate is used for smtps, imaps, pop3s, and https listeners.
certificate:
  enabled: false
  secretName: mail-example-com-tls
  # If false, make sure to provide the secret before helm chart installation.
  secretOptional: true

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# annotations
statefulset:
  annotations: {}
