---
# Default values for stalwart with FoundationDB.
# This is a YAML-formatted file.

# REALLY IMPORTANT
# The default stalstalwartlabs/stalwart container does work with
# FoundationDB, you need build a custom image with the FoundationDB 
# client tools included. The FoundationDB client tools should match
#  the version of the FoundationDB cluster you are connecting to.
image:
  repository: yourcustumrepo/stalwart-foundationdb
  tag: vX.X.X-fdbX.X

## Enable recoveryAdmin on first time startup
# recoveryAdmin:
#   enabled: false
#   username: admin
#   password: change-me

## Configure storage backend for FoundationDB
config:
  "@type": "FoundationDb"
  clusterFile: /etc/stalwart/cluster-file
  # datacenterId:
  # machineId:
  # transactionRetryDelay:
  # transactionRetryLimit:
  # transactionTimeout:

# Mount the FoundationDB cluster file from a ConfigMap,
# generated by the fdb-kubernetes-operator or provided by the user.
foundationdb:
  enabled: true
  clusterFileConfigMap: fdb-cluster-config

## Optional: Enable Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
  hosts:
    - host: mail.example.com
      paths:
        - path: /
          pathType: Prefix
          portName: https
  tls:
    - secretName: mail-example-com-tls
      hosts:
        - mail.example.com

## Optional: Mount TLS Certificate into container
certificate:
  enabled: true
  secretName: mail-example-com-tls
