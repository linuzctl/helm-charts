{{- if .Values.license | default .Values.global.license }}
apiVersion: v1
kind: Secret
metadata:
  name: minio-license
  namespace: {{ include "aistor.namespace" $ }}
  annotations:
    aistor.min.io/authors: MinIO, Inc.
    aistor.min.io/license: Enterprise
    aistor.min.io/support: https://subnet.min.io
    aistor.min.io/version: RELEASE.2026-04-13T10-27-16Z
    {{- if $.Values.annotations }}
    {{ $.Values.annotations | toYaml | nindent 4 }}
    {{- end }}
  {{- if $.Values.labels }}
  labels:
    {{ $.Values.labels | toYaml | nindent 4 }}
  {{- end }}
type: Opaque
data:
  "minio.license": {{ .Values.license | default .Values.global.license | b64enc }}
{{- end }}
