{{- if (include "aistor.operatorEnabled" (dict "operator" "object-store" "root" $.Values)) }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    aistor.min.io/authors: MinIO, Inc.
    aistor.min.io/license: Enterprise
    aistor.min.io/support: https://subnet.min.io
    aistor.min.io/version: RELEASE.2026-04-13T10-27-16Z
    controller-gen.kubebuilder.io/version: v0.20.0
    {{- if $.Values.annotations }}
    {{ $.Values.annotations | toYaml | nindent 4 }}
    {{- end }}
  {{- if $.Values.labels }}
  labels:
    {{ $.Values.labels | toYaml | nindent 4 }}
  {{- end }}
  name: policybindings.sts.min.io
spec:
  group: sts.min.io
  names:
    kind: PolicyBinding
    listKind: PolicyBindingList
    plural: policybindings
    shortNames:
      - policybinding
    singular: policybinding
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                application:
                  properties:
                    namespace:
                      type: string
                    serviceaccount:
                      type: string
                  required:
                    - namespace
                    - serviceaccount
                  type: object
                policies:
                  items:
                    type: string
                  type: array
              required:
                - application
                - policies
              type: object
          type: object
      served: true
      storage: false
      subresources: {}
    - additionalPrinterColumns:
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1beta1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                application:
                  properties:
                    namespace:
                      type: string
                    serviceaccount:
                      type: string
                  required:
                    - namespace
                    - serviceaccount
                  type: object
                policies:
                  items:
                    type: string
                  type: array
              required:
                - application
                - policies
              type: object
          type: object
      served: true
      storage: true
      subresources: {}
{{- end -}}
