{{- if include "aistor.webhookEnabled" . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aistor-object-store-webhook
  annotations:
    aistor.min.io/authors: MinIO, Inc.
    aistor.min.io/license: Enterprise
    aistor.min.io/support: https://subnet.min.io
    aistor.min.io/version: RELEASE.2026-07-16T23-53-30Z
    {{- if $.Values.annotations }}
    {{ $.Values.annotations | toYaml | nindent 4 }}
    {{- end }}
  {{- if $.Values.labels }}
  labels:
    {{ $.Values.labels | toYaml | nindent 4 }}
  {{- end }}
rules:
  # Read object stores to look up their spread-zone configuration. This role is
  # bound per watched namespace (RoleBinding) in namespace-scoped mode, or
  # cluster-wide (ClusterRoleBinding) otherwise.
  - apiGroups: ["aistor.min.io"]
    resources: ["objectstores"]
    verbs: ["get"]
{{- end }}
