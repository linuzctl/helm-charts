{{- if (include "aistor.operatorEnabled" (dict "operator" "aihub" "root" $.Values)) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aistor:aihub
  annotations:
    aistor.min.io/authors: MinIO, Inc.
    aistor.min.io/license: Enterprise
    aistor.min.io/support: https://subnet.min.io
    aistor.min.io/version: RELEASE.2026-07-14T19-42-05Z
    {{- if $.Values.annotations }}
    {{ $.Values.annotations | toYaml | nindent 4 }}
    {{- end }}
  {{- if $.Values.labels }}
  labels:
    {{ $.Values.labels | toYaml | nindent 4 }}
  {{- end }}
rules:
  ### Standard operator permissions
  
  # Allow the operator to manage events for logging and debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]


  ### Operator permissions for managing AIHub components

  # Monitor AIHub resources
  - apiGroups: ["aistor.min.io"]
    resources: ["aihubs"]
    verbs: ["get", "list", "watch"]

  # Allow updating the status of AIHub resources
  - apiGroups: ["aistor.min.io"]
    resources: ["aihubs/status"]
    verbs: ["update"]

  # Allow updating finalizers (required by blockOwnerDeletion in owner references)
  - apiGroups: ["aistor.min.io"]
    resources: ["aihubs/finalizers"]
    verbs: ["update"]

  # Monitor ObjectStore resources
  - apiGroups: ["aistor.min.io"]
    resources: ["objectstores"]
    verbs: ["get", "list", "watch"]

  # Monitor configuration maps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Manage secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "update", "watch"]
    
  # Manage deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "list", "update", "watch"]

  # Manage services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "list", "update", "watch"]

  # Manage pods (delete required for RestartPodsIfNotRunning)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete", "list", "watch"]


  ### Service account, RBAC and MinIO policy management

  # Service accounts
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "list", "update", "watch"]

  # MinIO policy bindings
  - apiGroups: ["sts.min.io"]
    resources: ["policybindings"]
    verbs: ["create", "delete", "list", "update", "watch"]
{{- end }}
