{{- if .Values.tls.secretName -}}
{{-   if eq "true" (include "gitlab.gatewayApi.route.enabled" .) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "gitlab.standardLabels" . | nindent 4 }}
    {{- include "ai-gateway.labels" . | nindent 4 }}
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: {{ include "ai-gateway.fullname" . }}
  validation:
    hostname: {{ .Values.backendTLSPolicy.hostname | default (printf "%s.%s.svc" (include "ai-gateway.fullname" .) .Release.Namespace) | quote }}
    caCertificateRefs:
    - group: ""
      kind: Secret
      name: {{ .Values.tls.caSecretName | quote }}
{{-   end }}
{{- end }}
