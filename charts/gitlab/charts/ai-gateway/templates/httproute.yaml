{{- if eq "true" (include "gitlab.gatewayApi.route.enabled" .) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gitlab.standardLabels" $ | nindent 4 }}
    {{- include "ai-gateway.labels" . | nindent 4 }}
  annotations:
    {{ .Values.gatewayRoute.annotations | toYaml | nindent 4 }}
spec:
  parentRefs:
  {{- include "gitlab.gatewayApi.gatewayRef" . | nindent 4 }}
  hostnames:
    - {{ include "gitlab.ai-gateway.hostname" . | quote }}
  rules:
    - backendRefs:
        - kind: Service
          name: {{ include "ai-gateway.fullname" . }}
          {{- if .Values.tls.secretName }}
          port: 443
          {{- else }}
          port: {{ .Values.service.port }}
          {{- end }}
          weight: 1
    {{- with .Values.gatewayRoute.filters }}
      filters:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}