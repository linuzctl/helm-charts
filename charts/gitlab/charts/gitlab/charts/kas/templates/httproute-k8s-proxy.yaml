{{- if .Values.global.kas.enabled -}}
{{- if eq "true" (include "gitlab.gatewayApi.route.enabled" .) -}}
{{/*
The KAS Kubernetes API proxy (k8sApiPath) serves plain HTTP/1.1 REST traffic. It is
intentionally kept in a separate HTTPRoute so that the gitlab-kas BackendTrafficPolicy
(which sets useClientProtocol: true for cross-served gRPC/WSS on the agent route) does
not force h2c onto this backend. See:
https://gitlab.com/gitlab-org/charts/gitlab/-/work_items/6557
*/}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "fullname" . }}-k8s-proxy
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "gitlab.standardLabels" $ | nindent 4 }}
    {{- include "gitlab.commonLabels" $ | nindent 4 }}
  annotations:
    {{ .Values.gatewayRoute.annotations | toYaml | nindent 4 }}
spec:
  parentRefs:
  {{- include "gitlab.gatewayApi.gatewayRef" . | nindent 4 }}
  hostnames:
    - {{ include "gitlab.kas.hostname" . | quote }}
  rules:
  - backendRefs:
    - kind: Service
      name: {{ template "gitlab.kas.serviceName" . }}
      port: {{ .Values.service.kubernetesApiPort }}
      weight: 1
    {{- with .Values.gatewayRoute.filters }}
    filters:
      {{- . | toYaml | nindent 6 }}
    {{- end }}
    {{- with .Values.gatewayRoute.timeouts }}
    timeouts:
      {{- . | toYaml | nindent 6 }}
    {{- else }}
    {{/* k8s-proxy streams (kubectl exec/logs/port-forward) are long-lived connections. */}}
    timeouts:
      request: 2h
      backendRequest: 2h
    {{- end }}
    matches:
    - path:
        type: PathPrefix
        value: {{ .Values.ingress.k8sApiPath | quote }}
{{- end }}
{{- end }}
